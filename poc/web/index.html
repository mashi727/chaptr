<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Chaptr PoC — 波形 / スペクトログラム / ms再生 / チャプター</title>
<link rel="icon" href="data:,">
<link rel="apple-touch-icon" href="data:,">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root { --bg:#0d0f15; --panel:#161a24; --fg:#e6e9ef; --dim:#8b93a7; --accent:#4caf6a; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif; }
  body { display:flex; flex-direction:column; height:100vh; }
  header { padding:8px 12px; background:var(--panel); border-bottom:1px solid #222838; }
  header h1 { font-size:14px; margin:0 0 6px; font-weight:600; }
  .row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  button, input, label.btn { background:#222838; color:var(--fg); border:1px solid #313a52;
    border-radius:6px; padding:6px 10px; font-size:13px; cursor:pointer; }
  button:active { background:#2c3550; }
  .accent { background:var(--accent); border-color:var(--accent); color:#06210f; font-weight:600; }
  #pos { font-size:22px; font-variant-numeric:tabular-nums; font-weight:700; }
  #posms,#fps,#perf,#info { color:var(--dim); font-size:12px; }
  .grow { flex:1; }
  #stage { flex:1; display:flex; flex-direction:column; gap:4px; padding:6px; min-height:0; }
  .canvaswrap { flex:1; position:relative; min-height:0; border:1px solid #222838; border-radius:6px; overflow:hidden; }
  .canvaswrap span.lbl { position:absolute; top:4px; left:6px; font-size:11px; color:var(--dim);
    background:rgba(0,0,0,.4); padding:1px 5px; border-radius:4px; pointer-events:none; }
  canvas { width:100%; height:100%; display:block; touch-action:none; }
  aside { background:var(--panel); border-top:1px solid #222838; padding:8px 12px; max-height:32vh; overflow:auto; }
  ul#chapters { list-style:none; margin:6px 0 0; padding:0; }
  ul#chapters li { display:flex; gap:6px; align-items:center; padding:3px 0; }
  ul#chapters .t { font-variant-numeric:tabular-nums; color:var(--accent); cursor:pointer; min-width:80px; }
  ul#chapters input { flex:1; }
  small { color:var(--dim); }
</style>
</head>
<body>
<header>
  <h1>Chaptr PoC — Web Audio で成立性検証（波形 / スペクトログラム / ms再生 / チャプター）</h1>
  <div class="row">
    <label class="btn">📂 音声/動画を開く<input id="file" type="file" accept="audio/*,video/*" hidden></label>
    <button id="synth">合成チャープ生成</button>
    <input id="synthlen" type="number" value="30" min="2" max="600" style="width:64px"> <small>秒</small>
    <span class="grow"></span>
    <span id="fps">– fps</span>
  </div>
  <div class="row" style="margin-top:6px">
    <button id="play" class="accent" style="font-size:18px; min-width:48px">▶</button>
    <span id="pos">00:00.000</span>
    <span id="posms">0.0 ms</span>
    <span style="width:12px"></span>
    <button id="m100">−100ms</button>
    <button id="m10">−10ms</button>
    <button id="p10">+10ms</button>
    <button id="p100">+100ms</button>
    <span style="width:12px"></span>
    <button id="addch" class="accent">＋ チャプター（再生位置）</button>
  </div>
  <div class="row" style="margin-top:6px">
    <button id="zoomout">－ ズーム</button>
    <button id="zoomin">＋ ズーム</button>
    <button id="zoomfit">全体</button>
    <button id="left">◀ スクロール</button>
    <button id="right">スクロール ▶</button>
    <span class="grow"></span>
    <span id="perf">STFT: –</span>
  </div>
  <div class="row" style="margin-top:4px"><span id="info">合成チャープ生成 または ファイルを開いてください。波形/スペクトログラムをクリックでシーク、ドラッグでスクラブ、ホイール/ピンチでズーム。</span></div>
</header>

<main id="stage">
  <div class="canvaswrap"><span class="lbl">波形（時間–振幅 / min-max LOD）</span><canvas id="waveform"></canvas></div>
  <div class="canvaswrap"><span class="lbl">スペクトログラム（可視範囲オンデマンド STFT / inferno）</span><canvas id="spectro"></canvas></div>
</main>

<aside>
  <div class="row">
    <strong>チャプター</strong>
    <span class="grow"></span>
    <button id="expvce">⬇ vce.json</button>
    <button id="expyt">⬇ YouTube text</button>
  </div>
  <ul id="chapters"></ul>
</aside>

<script type="module" src="./app.js"></script>
</body>
</html>
